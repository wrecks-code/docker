networks:
  # internes App-Netz NUR für SearXNG <-> Valkey
  searxng-net:
    driver: bridge
    internal: true
  # externes Proxy-Netz von Traefik (muss existieren)
  traefik-net:
    external: true

services:
  redis:
    container_name: searxng-redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - searxng-net
    volumes:
      - /opt/docker/appdata/searxng/valkey:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - searxng-net
      - traefik-net
    volumes:
      - /opt/docker/appdata/searxng/etc:/etc/searxng:rw
      - /opt/docker/appdata/searxng/data:/var/cache/searxng:rw
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-net
      - traefik.http.routers.searxng.rule=Host(`${SEARXNG_HOST}`)
      - traefik.http.routers.searxng.entrypoints=web,websecure
      - traefik.http.services.searxng.loadbalancer.server.port=8080