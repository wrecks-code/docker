services:
  qdirstat:
    image: jlesage/qdirstat:latest
    container_name: qdirstat
    restart: unless-stopped
    networks:
      - traefik-net
    volumes:
      - /:/mnt/host:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-net
      - traefik.http.routers.qdirstat.rule=Host(`${QDIRSTAT_HOST}`)
      - traefik.http.routers.qdirstat.entrypoints=web,websecure
      - traefik.http.services.qdirstat.loadbalancer.server.port=5800

      - homepage.group=Backend Services
      - homepage.name=Qdirstat
      - homepage.icon=qdirstat
      - homepage.href=https://${QDIRSTAT_HOST}
      - homepage.description=Web UI for visualizing disk usage (QDirStat) against the host filesystem.

networks:
  traefik-net:
    external: true