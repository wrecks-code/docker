services:
  tailscale:
    image: tailscale/tailscale:stable
    container_name: tailscale
    restart: unless-stopped
    # routing/exit needs host net + kernel TUN

    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false # kernel TUN for routing
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_ROUTES=${TS_ROUTES} # advertise your LAN
      - TS_EXTRA_ARGS=--accept-dns=false --advertise-exit-node
    volumes:
      - /opt/docker/appdata/tailscale:/var/lib/tailscale
    healthcheck:
      test:
        - CMD
        - tailscale
        - status
      interval: 30s
      timeout: 5s
      retries: 5
networks: {}
