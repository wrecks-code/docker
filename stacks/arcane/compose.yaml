networks:
  traefik-net:
    external: true

services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped

    # Keine Ports exposen – Traefik routed intern
    #ports:
    #  - 3552:3552

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # App-Daten (Settings, DB, etc.)
      - /opt/docker/appdata/arcane/data:/app/data
      # Projects (= Stacks) auf deinen globalen Stacks-Pfad legen
      - /opt/docker/stacks:/app/data/projects

    environment:
      - APP_URL=https://${ARCANE_HOST}
      - LOG_LEVEL=info
      - LOG_JSON=false

      # Security – bitte eigene Werte nutzen
      - ENCRYPTION_KEY=CHANGEME
      - JWT_SECRET=CHANGEME

      # Auth
      - OIDC_ENABLED=false

      # Database (SQLite im Bind Mount unter /opt/docker/appdata/arcane/data)
      - DATABASE_URL=file:data/arcane.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(2500)&_txlock=immediate

      - TZ=Europe/Berlin

    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3552/health
      interval: 60s
      timeout: 10s
      retries: 3

    networks:
      - traefik-net

    labels:
      - traefik.enable=true
      - traefik.http.routers.arcane.rule=Host(`${ARCANE_HOST}`)
      - traefik.http.routers.arcane.entrypoints=websecure
      - traefik.http.routers.arcane.tls=true
      - traefik.http.routers.arcane.tls.options=nohttp2@file
      - traefik.http.services.arcane.loadbalancer.server.port=3552

      - homepage.group=Ops & Monitoring
      - homepage.name=Arcane
      - homepage.icon=arcane
      - homepage.href=https://${ARCANE_HOST}
      - homepage.description=Modern Docker Management, Designed for Everyone
      - homepage.siteMonitor=https://${ARCANE_HOST}